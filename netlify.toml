# Email APIs
[[redirects]]
from = "/api/send-otp-email"
to = "/.netlify/functions/send-otp-email"
status = 200

[[redirects]]
from = "/api/verify-otp"
to = "/.netlify/functions/verify-otp"
status = 200

[[redirects]]
from = "/api/send-test-email"
to = "/.netlify/functions/send-test-email"
status = 200

[[redirects]]
