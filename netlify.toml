# Functions configuration
[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

# CRITICAL: Explicit function routing rules MUST come before the SPA fallback
# These ensure API endpoints are routed to Netlify Functions before the catch-all
# The functions use in-code path config (export const config = { path: ... })
# but explicit redirects here ensure they're prioritized correctly

# Payment API - Routes to create-charge-proxy.mts
# This is a critical payment endpoint that MUST be server-side for security
[[redirects]]
from = "/api/create-charge"
to = "/.netlify/functions/create-charge-proxy"
status = 200

# User balance API - Routes to user-balance.mts
[[redirects]]
from = "/api/user-balance"
to = "/.netlify/functions/user-balance"
status = 200

[[redirects]]
from = "/api/user-balance/*"
to = "/.netlify/functions/user-balance"
status = 200

# Instant top-up API - Routes to instant-topup.mts
[[redirects]]
from = "/api/instant-topup"
to = "/.netlify/functions/instant-topup"
status = 200

# Transaction status API - Routes to transaction-status.mts
[[redirects]]
from = "/api/transaction-status/*"
to = "/.netlify/functions/transaction-status"
status = 200

# Confirm pending tickets - Routes to confirm-pending-tickets-proxy.mts
[[redirects]]
from = "/api/confirm-pending-tickets"
to = "/.netlify/functions/confirm-pending-tickets-proxy"
status = 200

# CDP Transfer API - Routes to cdp-transfer.mts
[[redirects]]
from = "/api/cdp/*"
to = "/.netlify/functions/cdp-transfer"
status = 200

# CDP Analytics Webhook - Routes to cdp-analytics-webhook.mts
[[redirects]]
from = "/api/cdp-analytics/webhook"
to = "/.netlify/functions/cdp-analytics-webhook"
