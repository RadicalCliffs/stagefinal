[[redirects]]
from = "/api/get-backend-info"
to = "/.netlify/functions/get-backend-info"
status = 200

# SendGrid Email Service - Routes to sendgrid-email-service.mts
[[redirects]]
from = "/api/send-email"
to = "/.netlify/functions/sendgrid-email-service"
status = 200

# Confirm Pending Tickets Health Check - Routes to confirm-pending-tickets-health.mts
[[redirects]]
from = "/api/confirm-pending-tickets/health"
to = "/.netlify/functions/confirm-pending-tickets-health"
status = 200

# Update Auth Modal Styles - Routes to update-auth-modal-styles.mts
[[redirects]]
from = "/api/update-auth-modal-styles"
to = "/.netlify/functions/update-auth-modal-styles"
status = 200

# Cleanup Duplicate Emails - Routes to cleanup-duplicate-emails.mts
[[redirects]]
from = "/api/cleanup-duplicate-emails"
to = "/.netlify/functions/cleanup-duplicate-emails"
status = 200

# Instant Win Sync - Routes to instant-win-sync.mts
[[redirects]]
from = "/api/instant-win-sync/*"
to = "/.netlify/functions/instant-win-sync"
status = 200

# SPA fallback - redirect all other routes to index.html
# force = false ensures explicit redirects above take precedence
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/fonts/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.woff2"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.ttf"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[build]
command = "npx vite build"
publish = "dist"

[build.environment]
NODE_VERSION = "22"

# Email integration plugin for transactional emails via SendGrid
[[plugins]]
package = "@netlify/plugin-emails"