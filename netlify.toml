to = "/.netlify/functions/onramp-session-token"
status = 200

# Notifications API - Routes to notification-service.mts
[[redirects]]
from = "/api/notifications"
to = "/.netlify/functions/notification-service"
status = 200

[[redirects]]
from = "/api/notifications/*"
to = "/.netlify/functions/notification-service"
status = 200

# Secure Write API - Routes to secure-write.mts
[[redirects]]
from = "/api/secure-write/*"
to = "/.netlify/functions/secure-write"
status = 200

# Create User API - Routes to create-user.mts
[[redirects]]
from = "/api/create-user"
to = "/.netlify/functions/create-user"
